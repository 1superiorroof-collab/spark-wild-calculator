<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wild Calculator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .calculator {
            background: #000;
            padding: 20px;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            width: 320px;
        }
        .display {
            background: #000;
            color: #fff;
            font-size: 3rem;
            text-align: right;
            padding: 20px;
            margin-bottom: 20px;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            word-wrap: break-word;
        }
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }
        button {
            padding: 0;
            height: 65px;
            font-size: 1.8rem;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.1s, filter 0.1s;
        }
        button:active { transform: scale(0.92); }
        .btn-num {
            background: #333;
            color: #fff;
        }
        .btn-op { background: #f39c12; color: #fff; }
        .btn-eq { background: #3498db; color: #fff; grid-column: span 2; border-radius: 50%; }
        .btn-ac { background: #e74c3c; color: #fff; }
        .btn-zero { border-radius: 50% 50% 50% 50% / 50% 50% 50% 50%; grid-column: span 2; }
    </style>
</head>
<body>
    <div class="calculator">
        <div class="display" id="display">0</div>
        <div class="buttons">
            <button class="btn-ac" onclick="clearDisplay()">AC</button>
            <button class="btn-op" onclick="appendOp('/')">÷</button>
            <button class="btn-op" onclick="appendOp('*')">×</button>
            <button class="btn-op" onclick="deleteChar()">⌫</button>
            
            <button class="btn-num" onclick="appendNum('7')">7</button>
            <button class="btn-num" onclick="appendNum('8')">8</button>
            <button class="btn-num" onclick="appendNum('9')">9</button>
            <button class="btn-op" onclick="appendOp('-')">−</button>
            
            <button class="btn-num" onclick="appendNum('4')">4</button>
            <button class="btn-num" onclick="appendNum('5')">5</button>
            <button class="btn-num" onclick="appendNum('6')">6</button>
            <button class="btn-op" onclick="appendOp('+')">+</button>
            
            <button class="btn-num" onclick="appendNum('1')">1</button>
            <button class="btn-num" onclick="appendNum('2')">2</button>
            <button class="btn-num" onclick="appendNum('3')">3</button>
            <button class="btn-eq" onclick="calculate()">=</button>
            
            <button class="btn-zero btn-num" onclick="appendNum('0')">0</button>
            <button class="btn-num" onclick="appendNum('.')">.</button>
        </div>
    </div>

    <script>
        let current = '0';
        const display = document.getElementById('display');
        
        function update() {
            display.textContent = current;
        }
        
        function appendNum(n) {
            if (current === '0' && n !== '.') current = '';
            current += n;
            update();
        }
        
        function appendOp(op) {
            current += op;
            update();
        }
        
        function clearDisplay() {
            current = '0';
            update();
        }
        
        function deleteChar() {
            if (current.length > 1) {
                current = current.slice(0, -1);
            } else {
                current = '0';
            }
            update();
        }
        
        function calculate() {
            try {
                current = String(eval(current));
            } catch {
                current = 'Error';
            }
            update();
        }
    </script>
</body>
</html>
