<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wild Calculator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }
        .calculator {
            background: #000;
            padding: 20px;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            width: 320px;
        }
        .display {
            background: #000;
            color: #fff;
            font-size: 4rem;
            text-align: right;
            padding: 10px 20px;
            margin-bottom: 15px;
            min-height: 90px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
        }
        .row { display: flex; gap: 12px; justify-content: center; }
        button {
            width: 70px;
            height: 65px;
            font-size: 2rem;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 3px 0 rgba(0,0,0,0.3);
        }
        button:active { transform: translateY(3px); box-shadow: none; }
        .num { background: #333; color: #fff; }
        .op { background: #f09c12; color: #fff; }
        .eq { background: #3498db; color: #fff; width: 152px; border-radius: 35px; }
        .ac { background: #e74c3c; color: #fff; }
        .zero { width: 152px; border-radius: 35px; }
    </style>
</head>
<body>
    <div class="calculator">
        <div class="display" id="display">0</div>
        
        <div class="row">
            <button class="ac" onclick="clearDisplay()">AC</button>
            <button class="op" onclick="appendOp('/')">÷</button>
            <button class="op" onclick="appendOp('*')">×</button>
            <button class="op" onclick="deleteChar()">⌫</button>
        </div>
        
        <div class="row">
            <button class="num" onclick="appendNum('7')">7</button>
            <button class="num" onclick="appendNum('8')">8</button>
            <button class="num" onclick="appendNum('9')">9</button>
            <button class="op" onclick="appendOp('-')">−</button>
        </div>
        
        <div class="row">
            <button class="num" onclick="appendNum('4')">4</button>
            <button class="num" onclick="appendNum('5')">5</button>
            <button class="num" onclick="appendNum('6')">6</button>
            <button class="op" onclick="appendOp('+')">+</button>
        </div>
        
        <div class="row">
            <button class="num" onclick="appendNum('1')">1</button>
            <button class="num" onclick="appendNum('2')">2</button>
            <button class="num" onclick="appendNum('3')">3</button>
            <button class="eq" onclick="calculate()">=</button>
        </div>
        
        <div class="row">
            <button class="zero num" onclick="appendNum('0')">0</button>
            <button class="num" onclick="appendNum('.')">.</button>
        </div>
    </div>

    <script>
        let current = '0';
        const display = document.getElementById('display');
        
        function update() { display.textContent = current; }
        
        function appendNum(n) {
            if (current === '0' && n !== '.') current = '';
            current += n;
            update();
        }
        
        function appendOp(op) { current += op; update(); }
        
        function clearDisplay() { current = '0'; update(); }
        
        function deleteChar() {
            if (current.length > 1) current = current.slice(0, -1);
            else current = '0';
            update();
        }
        
        function calculate() {
            try { current = String(eval(current)); }
            catch { current = 'Error'; }
            update();
        }
    </script>
</body>
</html>
